<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>SFK Student Handbook</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      color: #151515;
      background:
        radial-gradient(circle at top left, rgba(255,216,61,.55), transparent 32%),
        linear-gradient(180deg, #fff9e8 0%, #fff1b8 100%);
      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
      overflow: hidden;
    }
    .handbook-shell {
      width: min(100%, 1160px);
      height: calc(100dvh - max(10px, env(safe-area-inset-top)) - max(10px, env(safe-area-inset-bottom)) - 20px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }
    .hero {
      background: #111;
      color: #fff;
      border: 3px solid rgba(255,255,255,.72);
      border-radius: 22px;
      padding: 12px 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,.14);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .hero-copy { min-width: 0; }
    .hero-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: clamp(1.18rem, 2.6vw, 2rem);
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hero-subtitle {
      margin: 4px 0 0;
      color: #ffdf4d;
      font-size: clamp(.86rem, 1.8vw, 1.2rem);
      font-weight: 900;
      line-height: 1.15;
    }
    .top-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      background: #ffd83d;
      color: #111;
      text-decoration: none;
      font-weight: 950;
      font-size: .98rem;
      box-shadow: 0 4px 0 #111;
      cursor: pointer;
      text-align: center;
      line-height: 1.1;
      white-space: nowrap;
    }
    .btn.dark {
      background: #111;
      color: #ffd83d;
      border: 2px solid #ffd83d;
      box-shadow: none;
    }
    .pdf-card {
      min-height: 0;
      background: #fff;
      border: 3px solid rgba(0,0,0,.16);
      border-radius: 22px;
      padding: 8px;
      box-shadow: 0 18px 45px rgba(0,0,0,.14);
      overflow: hidden;
      display: grid;
    }
    .pdf-viewer {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: block;
      border: 0;
      border-radius: 14px;
      background: #fff;
    }
    .pdf-fallback {
      display: none;
      place-items: center;
      text-align: center;
      padding: 18px;
      font-weight: 900;
      color: #3f3100;
    }
    .pdf-fallback p { margin: 0 0 12px; }

    @media (max-width: 820px) {
      body {
        padding: max(6px, env(safe-area-inset-top)) 6px max(6px, env(safe-area-inset-bottom));
      }
      .handbook-shell {
        width: 100%;
        height: calc(100dvh - max(6px, env(safe-area-inset-top)) - max(6px, env(safe-area-inset-bottom)) - 12px);
        gap: 6px;
      }
      .hero {
        border-width: 2px;
        border-radius: 16px;
        padding: 8px 9px;
        gap: 8px;
      }
      .hero-title {
        font-size: 1.05rem;
        gap: 7px;
      }
      .hero-subtitle {
        display: none;
      }
      .top-actions { gap: 6px; }
      .btn {
        min-height: 36px;
        padding: 8px 10px;
        font-size: .82rem;
        box-shadow: none;
      }
      .btn .long-label { display: none; }
      .pdf-card {
        border-width: 2px;
        border-radius: 15px;
        padding: 4px;
        box-shadow: 0 10px 24px rgba(0,0,0,.12);
      }
      .pdf-viewer { border-radius: 10px; }
    }

    @media (max-width: 430px) {
      .hero-title {
        max-width: 44vw;
        font-size: .98rem;
      }
      .btn {
        min-height: 34px;
        padding: 7px 9px;
        font-size: .78rem;
      }
      .top-actions { gap: 5px; }
    }

    @supports not (height: 100dvh) {
      body { min-height: 100vh; }
      .handbook-shell { height: calc(100vh - 20px); }
      @media (max-width: 820px) {
        .handbook-shell { height: calc(100vh - 12px); }
      }
    }
  </style>
</head>
<body>
  <main class="handbook-shell">
    <section class="hero">
      <div class="hero-copy">
        <h1 class="hero-title">📘 SFK Student Handbook</h1>
        <p class="hero-subtitle">Direct PDF view. #BeKind</p>
      </div>
      <nav class="top-actions" aria-label="Handbook actions">
        <a class="btn" href="index.html">← <span class="long-label">Back to</span> KindTrack</a>
        <a class="btn dark" href="student-handbook.pdf" target="_blank" rel="noopener">Open PDF</a>
      </nav>
    </section>

    <section class="pdf-card" aria-label="Student handbook PDF viewer">
      <iframe
        class="pdf-viewer"
        title="SFK Student Handbook PDF"
        src="student-handbook.pdf#view=FitH&toolbar=1&navpanes=0"
        loading="eager">
      </iframe>
      <div class="pdf-fallback">
        <div>
          <p>The PDF preview did not load in this browser.</p>
          <a class="btn dark" href="student-handbook.pdf" target="_blank" rel="noopener">Open PDF</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
